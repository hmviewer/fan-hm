<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE HM Signature Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="admin-header">
    <div>
      <p class="eyebrow">LOCAL ONLY</p>
      <h1>THE HM Signature Manager</h1>
      <p>127.0.0.1에서만 실행되는 시그니처 타임라인 관리 도구</p>
    </div>
    <a class="home-link" href="/api/template" download="the-hm-signature-template.csv">CSV 템플릿 다운로드</a>
  </header>

  <main>
    <section class="metrics" id="metrics"></section>
    <nav class="tabs" id="tabs" aria-label="관리 메뉴">
      <button class="active" data-tab="list">시그니처 목록</button>
      <button data-tab="csv">CSV 대량 등록</button>
      <button data-tab="quick">개별 빠른 등록</button>
      <button data-tab="review">구간 검수</button>
      <button data-tab="durations">기본 길이</button>
      <button data-tab="drafts">초안 관리</button>
      <button data-tab="preview">공개 데이터 미리보기</button>
      <button data-tab="diff">변경사항 비교</button>
      <button data-tab="backups">백업 및 복원</button>
    </nav>

    <section class="panel active" id="tab-list">
      <div class="panel-head"><h2>시그니처 목록</h2><button id="reloadData">새로고침</button></div>
      <div class="list-grid" id="signatureList"></div>
    </section>

    <section class="panel" id="tab-csv">
      <div class="panel-head"><h2>CSV 대량 등록</h2><a href="/api/template" download="the-hm-signature-template.csv">템플릿 다운로드</a></div>
      <label class="drop-zone" id="dropZone">
        <input id="csvFile" type="file" accept=".csv,text/csv">
        <strong>CSV 파일 선택 또는 드래그</strong>
        <span>UTF-8, UTF-8 BOM, 최대 10MB, 5,000행</span>
      </label>
      <textarea class="csv-text" id="csvText" placeholder="CSV 내용을 직접 붙여넣어도 됩니다."></textarea>
      <div class="mapping-box" id="mappingBox"></div>
      <div class="actions">
        <button id="previewCsv">CSV 검사 및 미리보기</button>
        <button id="saveCsvDraft" disabled>초안으로 저장</button>
        <button id="downloadErrors" disabled>오류 내역 다운로드</button>
      </div>
      <div id="csvResult"></div>
    </section>

    <section class="panel" id="tab-quick">
      <div class="panel-head"><h2>개별 빠른 등록</h2></div>
      <form class="quick-form" id="quickForm">
        <input class="quick-signature-number" name="signature_number" placeholder="시그니처 번호" inputmode="numeric" autocomplete="off" required>
        <input name="timeline_title" placeholder="타임라인 제목">
        <input name="timeline_members" placeholder="타임라인 멤버">
        <input class="quick-timeline-url" name="timeline_url" placeholder="SOOP VOD 또는 영상 URL" required>
        <input name="timeline_start_time" placeholder="시작 시간 예: 01:02:05">
        <input name="timeline_end_time" placeholder="종료 시간 예: 01:02:18">
        <select name="timeline_provider"><option value="">자동</option><option>youtube</option><option>soop</option><option>chzzk</option><option>external</option></select>
        <label><input name="timeline_is_primary" type="checkbox"> 대표 영상</label>
        <label><input name="timeline_is_published" type="checkbox" checked> 타임라인 공개</label>
        <input name="timeline_sort_order" placeholder="타임라인 정렬 순서">
        <button type="submit">분석 후 초안 생성</button>
      </form>
      <div id="quickResult"></div>
    </section>

    <section class="panel" id="tab-drafts">
      <div class="panel-head"><h2>초안 관리</h2><button id="loadDrafts">초안 새로고침</button></div>
      <div id="draftList"></div>
    </section>

    <section class="panel" id="tab-review">
      <div class="panel-head"><h2>종료점 찾기</h2><button id="loadReview">검수 목록 새로고침</button></div>
      <div class="review-stats" id="reviewStats"></div>
      <div class="review-workbench" id="reviewWorkbench"></div>
    </section>

    <section class="panel" id="tab-durations">
      <div class="panel-head"><h2>시그니처 기본 길이</h2><button id="loadDurations">기본 길이 새로고침</button></div>
      <div id="durationList"></div>
    </section>

    <section class="panel" id="tab-preview">
      <div class="panel-head"><h2>공개 데이터 미리보기</h2></div>
      <pre id="publicPreview"></pre>
    </section>

    <section class="panel" id="tab-diff">
      <div class="panel-head"><h2>변경사항 비교</h2><button id="loadGit">Git 상태 확인</button></div>
      <pre id="gitStatus"></pre>
      <pre id="gitDiff"></pre>
    </section>

    <section class="panel" id="tab-backups">
      <div class="panel-head"><h2>백업 및 복원</h2><button id="loadBackups">백업 새로고침</button></div>
      <div id="backupList"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
