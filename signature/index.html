<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#caa64a">

<link rel="stylesheet" href="../css/common.css">
<style>
body {
  min-height: 100vh;
  display: grid;
  place-items: center;
  margin: 0;
  font-family: "Pretendard", system-ui, sans-serif;
  background: linear-gradient(135deg, #f7f5ef, #ebe3cf);
  color: #24211c;
}
.redirect-box {
  width: min(520px, calc(100% - 32px));
  padding: 30px;
  border-radius: 14px;
  background: rgba(255,255,255,.78);
  border: 1px solid rgba(143, 135, 116, .24);
  box-shadow: 0 18px 48px rgba(64, 54, 28, .14);
  text-align: center;
}
.logo {
  justify-content: center;
  margin-bottom: 18px;
}
.redirect-box h1 {
  margin: 0 0 10px;
  font-size: 24px;
}
.redirect-box p {
  margin: 0 0 20px;
  color: #706b62;
  font-weight: 700;
}
.redirect-box a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  padding: 0 18px;
  border-radius: 10px;
  background: linear-gradient(135deg, #1f2424, #858781 46%, #caa64a);
  color: #fff;
  font-weight: 900;
}

</head>
