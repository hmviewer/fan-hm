<script>
(function () {
    var b = document.getElementById('onAirButton');
    if (!b) return;
    fetch('../api/live.php?ts=' + Date.now(), { cache: 'no-store' })
        .then(function (r) { return r.json(); })
        .then(function (d) {
            var n = (Array.isArray(d.members) ? d.members : []).filter(function (m) { return m && m.isLive; }).length;
            b.innerHTML = n > 0 ? 'ON AIR <span class="nav-live-count">' + n + '</span>' : 'ON AIR';
            b.setAttribute('aria-label', n > 0 ? '현재 LIVE ' + n + '명' : '현재 LIVE 없음');
        }).catch(function () {});
})();
</script>
<main class="page">

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
    const MEMBERS_JSON_URL = "../api/members.php";  // 관리자 데이터 자동연동(없으면 시드 폴백)
    const LIVE_API_URL = "../api/live.php";   // 사이트 서버사이드 SOOP 조회 (워커·Access 불필요)
    const DEFAULT_PROFILE_IMAGE = "https://profile.img.sooplive.co.kr/LOGO/sy/sysdemian/sysdemian.jpg";
    const RANK_ORDER = ["공동 대표", "부장", "차장", "과장", "팀장", "대리", "주임", "선임사원", "감찰", "웨이터"];
    const GROUP_ORDER = ["대표", "멤버", "감찰", "웨이터"];
    const GROUP_CLASS = { "대표": "leader", "멤버": "member", "감찰": "inspector", "웨이터": "waiter" };

    const memberContent = document.getElementById("memberContent");
    const totalCount = document.getElementById("totalCount");
    const liveCount = document.getElementById("liveCount");
    const rankList = document.getElementById("rankList");

    let allMembers = [], liveMap = new Map();

    function escapeHtml(v) { return String(v ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;"); }
    function getMemberId(m) { return String(m.soopId || m.id || m.userId || "").trim(); }
    function getProfileImage(userId) { const id = String(userId || "").trim(); return id ? `https://profile.img.sooplive.co.kr/LOGO/${encodeURIComponent(id.slice(0, 2))}/${encodeURIComponent(id)}/${encodeURIComponent(id)}.jpg` : DEFAULT_PROFILE_IMAGE; }
    function fallbackAvatar(img) { img.onerror = null; img.src = DEFAULT_PROFILE_IMAGE; }
    function getStationUrl(id) { return `https://www.sooplive.com/station/${encodeURIComponent(id)}`; }
    function isMobileDevice() { return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent); }
    function getLiveBroadNo(live) {
      const d = live?.broadNo || live?.broad_no || live?.broadNumber;
      if (d) return String(d).trim();
      const m = String(live?.url || "").match(/\/(\d+)(?:[?#].*)?$/);
      return m ? m[1] : "";
    }
    function getLiveLink(member, live) {
      const webUrl = String(live?.url || "").trim() || `https://play.sooplive.com/${encodeURIComponent(member.id)}/${getLiveBroadNo(live)}`;
      const broadNo = getLiveBroadNo(live);
      if (isMobileDevice() && member.id && broadNo) return `sooplive://player/live?user_id=${encodeURIComponent(member.id)}&broad_no=${encodeURIComponent(broadNo)}`;
      return webUrl;
    }
    function normalizeGroup(g) { const v = String(g || "멤버").trim(); return GROUP_ORDER.includes(v) ? v : "멤버"; }
    function normalizeMember(m, index) {
      const id = getMemberId(m);
      return { index, name: String(m.name || m.nickname || id || "멤버").trim(), id, group: normalizeGroup(m.group || m.role), rank: String(m.rank || m.group || m.role || "멤버").trim() };
    }
    function normalizeLiveData(data) {
      const list = Array.isArray(data?.members) ? data.members : (Array.isArray(data) ? data : []);
      liveMap = new Map();
      list.forEach(it => { const id = String(it.soopId || it.id || "").trim(); if (id && it.isLive) liveMap.set(id.toLowerCase(), it); });
    }
    function renderRankGuide() { rankList.innerHTML = RANK_ORDER.map(r => `<span class="rank-item">${escapeHtml(r)}</span>`).join(""); }

    function renderMemberCard(member) {
      const live = liveMap.get(member.id.toLowerCase());
      const isLive = Boolean(live);
      const name = escapeHtml(member.name), id = escapeHtml(member.id);
      const title = escapeHtml(live?.title || "");
      const href = isLive ? getLiveLink(member, live) : getStationUrl(member.id);
      const linkText = isLive ? "방송 보기" : "방송국";
      const groupClass = GROUP_CLASS[member.group] || "member";
      return `
        <a class="member-card ${groupClass} ${isLive ? "is-live" : ""}" href="${escapeHtml(href)}" target="_blank" rel="noopener">
          <div class="member-cover"><span class="live-badge">LIVE</span></div>
          <div class="member-photo-wrap"><img class="member-photo" src="${getProfileImage(member.id)}" onerror="fallbackAvatar(this)" alt="${name}" loading="lazy"></div>
          <div class="member-info">
            <div class="member-name">${name}</div>
            <div class="member-id">${id}</div>
            <div class="member-role-row"><span class="role-chip">${escapeHtml(member.rank || "멤버")}</span><span class="link-chip">${linkText}</span></div>
            ${isLive && title ? `<div class="live-title">${title}</div>` : ""}
          </div>
        </a>`;
    }
    function renderGroupSection(groupName, members) {
      const sc = GROUP_CLASS[groupName] || "member", title = escapeHtml(groupName);
      return `
        <section class="member-section group-section-${sc}" aria-label="${title}">
          <div class="group-head"><h2 class="group-title"><span class="group-dot"></span>${title}</h2></div>
          <div class="member-grid">${members.map(renderMemberCard).join("")}</div>
        </section>`;
    }
    function renderMembers() {
      totalCount.textContent = allMembers.length;
      liveCount.textContent = liveMap.size;
      const b = document.getElementById("onAirButton");
      if (b) {
        b.innerHTML = liveMap.size > 0 ? `ON AIR <span class="nav-live-count">${liveMap.size}</span>` : "ON AIR";
        b.setAttribute("aria-label", liveMap.size > 0 ? `현재 LIVE ${liveMap.size}명` : "현재 LIVE 없음");
      }
      if (!allMembers.length) { memberContent.innerHTML = `<section class="member-section"><div class="member-grid"><div class="empty-card">표시할 멤버가 없습니다.</div></div></section>`; return; }
      const html = GROUP_ORDER.map(g => {
        const gm = allMembers.filter(m => m.group === g).sort((a, b) => a.index - b.index);
        return gm.length ? renderGroupSection(g, gm) : "";
      }).join("");
      memberContent.innerHTML = html || `<section class="member-section"><div class="member-grid"><div class="empty-card">표시할 멤버가 없습니다.</div></div></section>`;
    }
    async function loadMembers() {
      try {
        const [mr, lr] = await Promise.allSettled([fetch(MEMBERS_JSON_URL, { cache: "no-store" }), fetch(`${LIVE_API_URL}?ts=${Date.now()}`, { cache: "no-store" })]);
        if (mr.status !== "fulfilled" || !mr.value.ok) throw new Error("members.json");
        const md = await mr.value.json();
        const raw = Array.isArray(md) ? md : (Array.isArray(md.members) ? md.members : []);
        allMembers = raw.map(normalizeMember).filter(m => m.id);
        if (lr.status === "fulfilled" && lr.value.ok) normalizeLiveData(await lr.value.json());
        renderMembers();
      } catch (e) {
        console.error(e);
        totalCount.textContent = "-"; liveCount.textContent = "-";
        memberContent.innerHTML = `<section class="member-section"><div class="member-grid"><div class="empty-card">멤버 정보를 불러오지 못했습니다.</div></div></section>`;
      }
    }
    renderRankGuide();
    loadMembers();
</script>
