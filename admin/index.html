<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The HM Local Admin</title>
  <link rel="stylesheet" href="local-admin.css?v=2">
</head>
<body>
  <aside class="sidebar">
    <a class="brand" href="../">
      <span class="brand-mark">HM</span>
      <span><strong>The HM</strong><small>Local Admin</small></span>
    </a>
    <nav class="nav-tabs" aria-label="관리 메뉴">
      <button class="nav-btn active" type="button" data-tab="dashboard">대시보드</button>
      <button class="nav-btn" type="button" data-tab="members">멤버</button>
      <button class="nav-btn" type="button" data-tab="notices">공지</button>
      <button class="nav-btn" type="button" data-tab="rank">후원 랭킹</button>
      <button class="nav-btn" type="button" data-tab="chatrank">채팅 랭킹</button>
      <button class="nav-btn" type="button" data-tab="shorts">쇼츠</button>
      <button class="nav-btn" type="button" data-tab="raw">Raw JSON</button>
    </nav>
    <div class="sidebar-actions">
      <a class="ghost-link" href="../signature/">시그니처 보기</a>
      <a class="ghost-link" href="../members/">멤버 보기</a>
      <a class="ghost-link" href="../">홈으로</a>
    </div>
  </aside>

  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">LOCAL MIRROR</p>
        <h1 id="pageTitle">대시보드</h1>
      </div>
      <div class="status-row">
        <span id="saveStatus" class="save-status">준비됨</span>
        <button id="reloadBtn" class="icon-btn" type="button" title="다시 불러오기">↻</button>
      </div>
    </header>

    <section id="dashboardPanel" class="panel active">
      <div class="metric-grid" id="metricGrid"></div>
      <div class="notice-band">
        <h2>작업 방식</h2>
        <p>이 관리자는 로컬 파일을 직접 수정합니다. 저장하면 `api/*.php` JSON 파일이 갱신되고 `backups/`에 이전 파일이 자동 백업됩니다. 시그니처는 로컬 SIGNATURE 페이지에서 확인합니다.</p>
      </div>
    </section>

    <section id="editorPanel" class="panel">
      <div class="toolbar">
        <div class="toolbar-left">
          <input id="searchInput" class="search-input" type="search" placeholder="검색">
          <button id="addBtn" class="primary-btn" type="button">추가</button>
          <button id="duplicateBtn" class="secondary-btn" type="button">복제</button>
          <button id="deleteBtn" class="danger-btn" type="button">삭제</button>
        </div>
        <div class="toolbar-right">
          <button id="saveBtn" class="primary-btn" type="button">저장</button>
        </div>
      </div>

      <div class="editor-layout">
        <div class="list-pane">
          <div id="itemCount" class="item-count">0개</div>
          <div id="itemList" class="item-list"></div>
        </div>
        <form id="editForm" class="edit-form"></form>
      </div>
    </section>

    <section id="rawPanel" class="panel">
      <div class="toolbar">
        <select id="rawTarget" class="select-input"></select>
        <button id="formatRawBtn" class="secondary-btn" type="button">정렬</button>
        <button id="saveRawBtn" class="primary-btn" type="button">Raw 저장</button>
      </div>
      <textarea id="rawEditor" class="raw-editor" spellcheck="false"></textarea>
    </section>
  </main>

  <script src="local-admin.js?v=2"></script>
</body>
</html>
